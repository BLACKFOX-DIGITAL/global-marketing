version: '3.8'

services:
  crm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: global-marketing-crm
    restart: unless-stopped
    ports:
      - "80:3000" # Expose the CRM directly onto port 80 of your VPS 
    volumes:
      - crm_data:/app/data
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/prod.db
      - JWT_SECRET=${JWT_SECRET:-fallback_secret_change_me_in_live}

volumes:
  crm_data:
    name: "crm_production_data"
