version: '3.8'

services:
  crm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: global-marketing-crm
    restart: unless-stopped
    volumes:
      - crm_data:/app/data
    environment:
      - NODE_ENV=production
      - CRON_SECRET=${CRON_SECRET:-my_secure_cron_secret_123}
      - DATABASE_URL=file:/app/data/prod.db
      - JWT_SECRET=${JWT_SECRET:-fallback_secret_change_me_in_live}

  # Caddy automatically proxies traffic and generates free HTTPS/SSL certificates!
  caddy:
    image: caddy:latest
    container_name: caddy-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - crm

volumes:
  crm_data:
    name: "crm_production_data"
  caddy_data:
  caddy_config:
